---
# =============================================================================
# 계획된 스위치오버 플레이북
# 점검 등으로 리더를 "일부러" 다른 노드로 옮길 때 사용합니다.
# (장애가 아닌 계획된 전환이라 서비스 중단을 최소화합니다.)
#
# 사용법:
#   ansible-playbook playbooks/switchover.yml -e target_leader=pg-node-2
# =============================================================================
- name: Patroni 계획된 스위치오버
  hosts: patroni_cluster[0]
  become: true
  become_user: postgres
  gather_facts: false
  vars:
    target_leader: ""              # 새 리더로 만들 노드 이름(-e 로 전달)
  tasks:
    - name: target_leader 가 지정되었는지 확인
      ansible.builtin.assert:
        that: target_leader | length > 0
        fail_msg: "-e target_leader=<노드이름> 형태로 대상 노드를 지정하세요."

    - name: 스위치오버 실행
      ansible.builtin.command: >
        patronictl -c {{ patroni_config_dir }}/patroni.yml
        switchover {{ cluster_name }}
        --candidate {{ target_leader }}
        --force
      register: switchover_out
      changed_when: true

    - name: 결과 출력
      ansible.builtin.debug:
        msg: "{{ switchover_out.stdout_lines }}"

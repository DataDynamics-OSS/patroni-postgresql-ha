---
# =============================================================================
# Patroni PostgreSQL HA Cluster Inventory
# =============================================================================
# 그룹은 서로 독립적입니다. 토폴로지를 자유롭게 구성하세요.
#
#   etcd            : DCS. 반드시 홀수, 최소 3대 (정족수 보장). 기본=전용 3대
#   patroni_cluster : PostgreSQL DB 노드. 2대 이상 자유 (P + N replicas)
#   pgbouncer       : 커넥션 풀러. 보통 DB 노드와 동일
#   haproxy         : VIP 라우팅 계층. 보통 DB 노드와 동일
#
# [co-location 하고 싶다면]
#   같은 호스트명을 etcd 그룹과 patroni_cluster 그룹에 둘 다 넣으면 됩니다.
#   (Ansible은 호스트 기준으로 동작하므로 한 노드가 etcd+DB 역할을 겸할 수 있음)
#
# 각 호스트에 반드시 필요한 변수:
#   node_ip          : 피어/클라이언트에 광고할 IP (모든 노드)
#   patroni_name     : Patroni 노드 이름 (patroni_cluster 호스트만)
#   keepalived_state / keepalived_priority : haproxy 호스트만 (1대 MASTER)
# =============================================================================

all:
  vars:
    ansible_user: root
    # ansible_ssh_private_key_file: ~/.ssh/id_rsa

  children:
    # -------------------------------------------------------------------------
    # etcd (DCS) — 전용 3대 (홀수, 최소 3). 가볍게 작은 노드로 구성 가능.
    # -------------------------------------------------------------------------
    etcd:
      hosts:
        etcd-1:
          ansible_host: 10.0.0.21
          node_ip: 10.0.0.21
        etcd-2:
          ansible_host: 10.0.0.22
          node_ip: 10.0.0.22
        etcd-3:
          ansible_host: 10.0.0.23
          node_ip: 10.0.0.23

    # -------------------------------------------------------------------------
    # PostgreSQL + Patroni 노드 — 2대 이상 자유롭게 추가/삭제 가능.
    # 노드를 늘리려면 동일 형식으로 항목만 추가하면 됩니다 (pg-node-3, ...).
    # -------------------------------------------------------------------------
    patroni_cluster:
      hosts:
        pg-node-1:
          ansible_host: 10.0.0.11
          node_ip: 10.0.0.11
          patroni_name: pg-node-1
        pg-node-2:
          ansible_host: 10.0.0.12
          node_ip: 10.0.0.12
          patroni_name: pg-node-2
        # pg-node-3:                  # 3번째 DB 노드 예시 (주석 해제하면 즉시 확장)
        #   ansible_host: 10.0.0.13
        #   node_ip: 10.0.0.13
        #   patroni_name: pg-node-3

    # -------------------------------------------------------------------------
    # PgBouncer — 기본적으로 DB 노드와 동일 (patroni_cluster 멤버 재사용)
    # -------------------------------------------------------------------------
    pgbouncer:
      hosts:
        pg-node-1:
        pg-node-2:
        # pg-node-3:

    # -------------------------------------------------------------------------
    # HAProxy + Keepalived (VIP) — DB 노드와 동일 배치.
    # keepalived는 1대만 MASTER, 나머지는 BACKUP. priority는 높을수록 우선.
    # -------------------------------------------------------------------------
    haproxy:
      hosts:
        pg-node-1:
          keepalived_state: MASTER
          keepalived_priority: 110
        pg-node-2:
          keepalived_state: BACKUP
          keepalived_priority: 105
        # pg-node-3:
        #   keepalived_state: BACKUP
        #   keepalived_priority: 100
